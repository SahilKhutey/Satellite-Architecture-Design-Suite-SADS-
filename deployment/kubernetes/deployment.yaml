apiVersion: apps/v1
kind: Deployment
metadata:
  name: sads-gateway
  namespace: sads
  labels:
    app: sads-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sads-gateway
  template:
    metadata:
      labels:
        app: sads-gateway
    spec:
      containers:
        - name: gateway
          image: sads-registry.aero/gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database-url
            - name: REDIS_URL
              value: "redis://sads-cache-service:6379/0"
---
apiVersion: v1
kind: Service
metadata:
  name: sads-gateway-service
  namespace: sads
spec:
  selector:
    app: sads-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
